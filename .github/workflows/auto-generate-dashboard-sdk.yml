name: Generate dashboard sdks
on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Comma-separated branches for the Tyk repo (e.g. "5.0,master,5.6")'
        required: true
        default: '5.0,master,5.6'
  pull_request:

jobs:
  generate-dashboard-sdks:
    runs-on: ubuntu-latest
    strategy:
      # Split the comma-separated branch list into an array.
      # If the workflow was not triggered via workflow_dispatch (e.g. pull_request), fall back to the default.
      matrix:
        source_branch: ${{ fromJson('["' + (github.event.inputs.branches || "master").replace(",", '","') + '"]') }}
    env:
      # For the current repository: if the source branch is "master", use "main".
      # Otherwise, use "release-<source_branch>".
      TARGET_BRANCH: ${{ matrix.source_branch == 'master' && 'main' || ('release-' + matrix.source_branch) }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to branch ${{ env.TARGET_BRANCH }} in current repository
        run: |
          echo "Switching to branch: $TARGET_BRANCH"
          git fetch origin $TARGET_BRANCH || true
          if git rev-parse --verify origin/$TARGET_BRANCH; then
            git checkout -B $TARGET_BRANCH origin/$TARGET_BRANCH
          else
            git checkout -B $TARGET_BRANCH
          fi

      - name: Checkout Tyk repo
        uses: actions/checkout@v4
        with:
          repository: TykTechnologies/tyk
          ref: ${{ matrix.source_branch }}
          path: tyk

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'

      - name: Prepare swagger file
        run: |
          echo "Using Tyk branch: ${{ matrix.source_branch }}"
          # Adjust the file path as needed
          cp tyk/swagger.yml swagger.yml

      - name: Generate dashboard sdks
        run: |
          make validate-swagger
          make dashboard

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "save generated dashboard sdks for source branch ${{ matrix.source_branch }} (committed on $TARGET_BRANCH)"
          branch: ${{ env.TARGET_BRANCH }}
